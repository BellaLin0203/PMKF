<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>工廠設備零件維護管理</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--primary:#2563eb;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;--danger:#dc2626;--shadow:0 10px 25px rgba(15,23,42,.08);--radius:16px}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#1d4ed8,#2563eb,#60a5fa);color:#fff;padding:26px 24px}header h1{margin:0;font-size:28px}header p{margin:8px 0 0;opacity:.9}
main{max-width:1200px;margin:0 auto;padding:22px}.tabs,.subtabs,.actions{display:flex;gap:8px;flex-wrap:wrap}.tabs{margin-bottom:18px}.subtabs{margin-bottom:14px}
button{border:0;border-radius:10px;padding:10px 13px;cursor:pointer;font-weight:700;background:#e5e7eb;color:#111827}.tab.active,.subtab.active,button.primary{background:var(--primary);color:#fff}
button.danger{background:#fee2e2;color:var(--danger)}button.small{padding:7px 9px;font-size:13px}.hidden{display:none}
.dashboard{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:20px}.stat,.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.stat .label{color:var(--muted);font-size:14px}.stat .num{font-size:30px;font-weight:800;margin-top:6px}.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card h2{margin:0 0 14px;font-size:19px}label{display:block;font-size:13px;color:var(--muted);margin:10px 0 5px}
input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;background:#fff}textarea{min-height:76px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
table{width:100%;border-collapse:collapse}th,td{text-align:left;border-bottom:1px solid var(--border);padding:11px 9px;vertical-align:top;font-size:14px}th{color:var(--muted);background:#f9fafb}.note{font-size:13px;color:var(--muted);line-height:1.6}.toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px;flex-wrap:wrap}.search{max-width:320px}.empty{text-align:center;padding:26px;color:var(--muted);background:#f9fafb;border:1px dashed var(--border);border-radius:12px}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;background:#fef3c7;color:#92400e;white-space:nowrap}.badge.overdue{background:#fee2e2;color:#991b1b}
.due-card-list{display:flex;flex-direction:column;gap:12px}.due-card{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start;padding:14px;border:1px solid var(--border);border-radius:14px;background:#fff}.due-main{min-width:0}.due-device{word-break:break-word;margin-bottom:4px}.due-title{font-weight:800;font-size:16px;word-break:break-word}.due-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.due-meta-item{background:#f9fafb;border-radius:10px;padding:8px;min-width:0}.due-meta-label{font-size:12px;color:var(--muted);margin-bottom:3px}.due-meta-value{font-weight:700;word-break:break-word}
@media(max-width:700px){.due-table{display:none}}@media(min-width:701px){.due-card-list{display:none}}
@media(max-width:900px){.dashboard{grid-template-columns:repeat(2,1fr)}.home-grid{grid-template-columns:1fr}}@media(max-width:560px){main{padding:14px}.dashboard,.row{grid-template-columns:1fr}header h1{font-size:23px}.due-card{grid-template-columns:1fr}.due-card .badge{width:max-content}.due-meta{grid-template-columns:1fr}}
</style>
</head>
<body>
<header><h1>工廠設備零件維護管理</h1><p>管理設備、零件、保養週期與維修履歷，資料儲存在本機瀏覽器。</p></header>
<main>
<div class="tabs"><button class="tab active" onclick="showMainTab('home',this)">首頁</button><button class="tab" onclick="showMainTab('devices',this)">設備清單</button><button class="tab" onclick="showMainTab('records',this)">維護紀錄</button><button class="tab" onclick="showMainTab('due',this)">保養提醒</button></div>

<section id="page-home">
  <section class="dashboard"><div class="stat"><div class="label">設備數量</div><div class="num" id="statDevices">0</div></div><div class="stat"><div class="label">零件數量</div><div class="num" id="statParts">0</div></div><div class="stat"><div class="label">維護紀錄</div><div class="num" id="statRecords">0</div></div><div class="stat"><div class="label">即將到期</div><div class="num" id="statDue">0</div></div></section>
  <section class="home-grid"><div class="card"><h2>最近維護紀錄</h2><div id="homeRecentRecords"></div></div><div class="card"><h2>即將到期保養</h2><div id="homeDueList"></div></div><div class="card"><h2>資料備份</h2><p class="note">可匯出 JSON 備份，也可以匯入到另一台電腦使用。</p><div class="actions"><button onclick="exportData()">匯出資料</button><button onclick="document.getElementById('importFile').click()">匯入資料</button><input id="importFile" type="file" accept=".json" class="hidden" onchange="importData(event)"><button class="danger" onclick="clearAll()">清空全部</button></div></div></section>
</section>

<section id="page-devices" class="hidden">
  <div class="subtabs"><button class="subtab active" onclick="showDeviceSubTab('device-list',this)">設備清單</button><button class="subtab" onclick="showDeviceSubTab('device-form',this)">新增 / 編輯設備</button><button class="subtab" onclick="showDeviceSubTab('part-list',this)">零件管理</button></div>
  <div id="device-sub-device-list" class="card"><div class="toolbar"><h2>設備清單</h2><input class="search" id="deviceSearch" placeholder="搜尋設備名稱、編號、位置" oninput="render()"></div><div id="deviceList"></div></div>
  <div id="device-sub-device-form" class="card hidden"><h2 id="deviceFormTitle">新增設備</h2><input type="hidden" id="deviceEditId"><label>設備名稱 *</label><input id="deviceName" placeholder="例：CNC-01、空壓機 A"><div class="row"><div><label>設備編號</label><input id="deviceCode" placeholder="EQ-001"></div><div><label>位置</label><input id="deviceLocation" placeholder="一廠 2F"></div></div><div class="row"><div><label>廠牌</label><input id="deviceBrand"></div><div><label>型號</label><input id="deviceModel"></div></div><label>序號</label><input id="deviceSerial"><label>備註</label><textarea id="deviceNote"></textarea><div class="actions"><button class="primary" onclick="saveDevice()">儲存設備</button><button onclick="resetDeviceForm()">清除</button></div></div>
  <div id="device-sub-part-list" class="card hidden"><h2>零件管理</h2><input type="hidden" id="partEditId"><div class="row"><div><label>選擇設備</label><select id="partDevice"></select></div><div><label>零件名稱 *</label><input id="partName" placeholder="例：皮帶、濾芯、馬達"></div></div><div class="row"><div><label>Part Number</label><input id="partNumber"></div><div><label>保養週期（天）</label><input id="partCycle" type="number" min="0" placeholder="例：90"></div></div><div class="actions"><button class="primary" onclick="savePart()">新增 / 更新零件</button><button onclick="resetPartForm()">清除</button></div><div id="partList"></div></div>
</section>

<section id="page-records" class="hidden"><div class="card"><h2>新增維護紀錄</h2><div class="row"><div><label>設備</label><select id="recordDevice" onchange="refreshRecordParts()"></select></div><div><label>零件</label><select id="recordPart"></select></div></div><div class="row"><div><label>維護日期</label><input id="recordDate" type="date"></div><div><label>維護人員</label><input id="recordOwner"></div></div><label>維護內容 *</label><textarea id="recordDesc"></textarea><div class="actions"><button class="primary" onclick="saveRecord()">新增紀錄</button></div></div><div class="card"><h2>維護紀錄</h2><div id="recordList"></div></div></section>
<section id="page-due" class="hidden"><div class="card"><h2>保養提醒</h2><p class="note">依照零件的「保養週期」與最後一次維護日期計算。30 天內到期會顯示提醒。</p><div id="dueList"></div></div></section>
</main>

<script>
const STORAGE_KEY="factoryMaintenanceDataV2";let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"devices":[],"parts":[],"records":[]}');
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(data))}
function e(s){return String(s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function today(){return new Date().toISOString().slice(0,10)}function addDays(d,n){let x=new Date(d+"T00:00:00");x.setDate(x.getDate()+Number(n||0));return x.toISOString().slice(0,10)}function diffDays(d){return Math.ceil((new Date(d+"T00:00:00")-new Date(today()+"T00:00:00"))/86400000)}
function deviceName(id){return data.devices.find(x=>x.id===id)?.name||"未指定設備"}function partName(id){return data.parts.find(x=>x.id===id)?.name||"未指定零件"}
function saveDevice(){let id=deviceEditId.value,n=deviceNameInput().trim();if(!n)return alert("請輸入設備名稱");let item={id:id||uid(),name:n,code:deviceCode.value.trim(),location:deviceLocation.value.trim(),brand:deviceBrand.value.trim(),model:deviceModel.value.trim(),serial:deviceSerial.value.trim(),note:deviceNote.value.trim()};id?data.devices[data.devices.findIndex(x=>x.id===id)]=item:data.devices.push(item);resetDeviceForm();render();showDeviceSubTab("device-list")}
function deviceNameInput(){return document.getElementById("deviceName").value}
function editDevice(id){let d=data.devices.find(x=>x.id===id);if(!d)return;showMainTab("devices");showDeviceSubTab("device-form");deviceFormTitle.textContent="編輯設備";deviceEditId.value=d.id;deviceName.value=d.name||"";deviceCode.value=d.code||"";deviceLocation.value=d.location||"";deviceBrand.value=d.brand||"";deviceModel.value=d.model||"";deviceSerial.value=d.serial||"";deviceNote.value=d.note||""}
function resetDeviceForm(){deviceFormTitle.textContent="新增設備";["deviceEditId","deviceName","deviceCode","deviceLocation","deviceBrand","deviceModel","deviceSerial","deviceNote"].forEach(id=>document.getElementById(id).value="")}
function deleteDevice(id){if(!confirm("確定刪除此設備？相關零件與維護紀錄也會刪除。"))return;let partIds=data.parts.filter(p=>p.deviceId===id).map(p=>p.id);data.devices=data.devices.filter(x=>x.id!==id);data.parts=data.parts.filter(p=>p.deviceId!==id);data.records=data.records.filter(r=>r.deviceId!==id&&!partIds.includes(r.partId));render()}
function savePart(){let editId=partEditId.value,deviceId=partDevice.value,name=partNameInput().trim();if(!deviceId)return alert("請先新增或選擇設備");if(!name)return alert("請輸入零件名稱");let item={id:editId||uid(),deviceId,name,number:partNumber.value.trim(),cycle:Number(partCycle.value||0)};editId?data.parts[data.parts.findIndex(x=>x.id===editId)]=item:data.parts.push(item);resetPartForm();render()}
function partNameInput(){return document.getElementById("partName").value}
function editPart(id){let p=data.parts.find(x=>x.id===id);if(!p)return;showMainTab("devices");showDeviceSubTab("part-list");partEditId.value=p.id;partDevice.value=p.deviceId;partName.value=p.name||"";partNumber.value=p.number||"";partCycle.value=p.cycle||""}
function resetPartForm(){["partEditId","partName","partNumber","partCycle"].forEach(id=>document.getElementById(id).value="")}
function deletePart(id){if(!confirm("確定刪除此零件？相關維護紀錄也會刪除。"))return;data.parts=data.parts.filter(x=>x.id!==id);data.records=data.records.filter(x=>x.partId!==id);render()}
function saveRecord(){let deviceId=recordDevice.value,partId=recordPart.value,desc=recordDesc.value.trim();if(!deviceId)return alert("請先選擇設備");if(!desc)return alert("請輸入維護內容");data.records.push({id:uid(),deviceId,partId,date:recordDate.value||today(),owner:recordOwner.value.trim(),desc});recordDate.value=today();recordOwner.value="";recordDesc.value="";render()}
function deleteRecord(id){if(!confirm("確定刪除此維護紀錄？"))return;data.records=data.records.filter(x=>x.id!==id);render()}
function refreshSelects(){let opts=data.devices.map(d=>`<option value="${d.id}">${e(d.name)}${d.code?" / "+e(d.code):""}</option>`).join("");partDevice.innerHTML=opts||'<option value="">尚無設備</option>';recordDevice.innerHTML=opts||'<option value="">尚無設備</option>';refreshRecordParts()}
function refreshRecordParts(){let parts=data.parts.filter(p=>p.deviceId===recordDevice.value);recordPart.innerHTML='<option value="">不指定零件</option>'+parts.map(p=>`<option value="${p.id}">${e(p.name)}</option>`).join("")}
function renderDevices(){let q=(deviceSearch?.value||"").toLowerCase(),list=data.devices.filter(d=>[d.name,d.code,d.location,d.brand,d.model,d.serial].join(" ").toLowerCase().includes(q));deviceList.innerHTML=list.length?`<table><thead><tr><th>設備</th><th>位置</th><th>型號 / 序號</th><th>零件</th><th>操作</th></tr></thead><tbody>${list.map(d=>`<tr><td><b>${e(d.name)}</b><br><span class="note">${e(d.code||"-")}</span></td><td>${e(d.location||"-")}</td><td>${e([d.brand,d.model].filter(Boolean).join(" ")||"-")}<br><span class="note">${e(d.serial||"")}</span></td><td>${data.parts.filter(p=>p.deviceId===d.id).length}</td><td><button class="small primary" onclick="editDevice('${d.id}')">編輯</button> <button class="small danger" onclick="deleteDevice('${d.id}')">刪除</button></td></tr>`).join("")}</tbody></table>`:'<div class="empty">目前沒有設備資料</div>'}
function renderParts(){partList.innerHTML=data.parts.length?`<table style="margin-top:14px"><thead><tr><th>設備</th><th>零件</th><th>Part Number</th><th>週期</th><th>操作</th></tr></thead><tbody>${data.parts.map(p=>`<tr><td>${e(deviceName(p.deviceId))}</td><td><b>${e(p.name)}</b></td><td>${e(p.number||"-")}</td><td>${p.cycle?p.cycle+" 天":"-"}</td><td><button class="small primary" onclick="editPart('${p.id}')">編輯</button> <button class="small danger" onclick="deletePart('${p.id}')">刪除</button></td></tr>`).join("")}</tbody></table>`:'<div class="empty" style="margin-top:14px">目前沒有零件資料</div>'}
function renderRecords(){let sorted=[...data.records].sort((a,b)=>(b.date||"").localeCompare(a.date||""));recordList.innerHTML=sorted.length?`<table><thead><tr><th>日期</th><th>設備 / 零件</th><th>內容</th><th>人員</th><th>操作</th></tr></thead><tbody>${sorted.map(r=>`<tr><td>${e(r.date||"-")}</td><td><b>${e(deviceName(r.deviceId))}</b><br><span class="note">${e(r.partId?partName(r.partId):"未指定零件")}</span></td><td>${e(r.desc)}</td><td>${e(r.owner||"-")}</td><td><button class="small danger" onclick="deleteRecord('${r.id}')">刪除</button></td></tr>`).join("")}</tbody></table>`:'<div class="empty">目前沒有維護紀錄</div>'}
function getDueItems(){return data.parts.filter(p=>p.cycle>0).map(p=>{let rs=data.records.filter(r=>r.partId===p.id).sort((a,b)=>(b.date||"").localeCompare(a.date||"")),last=rs[0]?.date||"",next=last?addDays(last,p.cycle):"",remain=next?diffDays(next):null;return {...p,lastDate:last,nextDate:next,remain}}).filter(x=>x.remain===null||x.remain<=30).sort((a,b)=>(a.remain??-9999)-(b.remain??-9999))}
function badge(p){if(p.remain!==null&&p.remain<0)return `<span class="badge overdue">逾期 ${Math.abs(p.remain)} 天</span>`;if(p.remain!==null)return `<span class="badge">剩 ${p.remain} 天</span>`;return '<span class="badge">未維護</span>'}
function dueTable(items){let rows=items.map(p=>({b:badge(p),dev:e(deviceName(p.deviceId)),part:e(p.name),num:e(p.number||""),last:e(p.lastDate||"尚無紀錄"),next:e(p.nextDate||"請新增維護紀錄")}));return `<table class="due-table"><thead><tr><th>狀態</th><th>設備</th><th>零件</th><th>最後維護</th><th>下次保養</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r.b}</td><td>${r.dev}</td><td><b>${r.part}</b><br><span class="note">${r.num}</span></td><td>${r.last}</td><td>${r.next}</td></tr>`).join("")}</tbody></table><div class="due-card-list">${rows.map(r=>`<div class="due-card"><div>${r.b}</div><div class="due-main"><div class="due-device">${r.dev}</div><div class="due-title">${r.part}</div>${r.num?`<div class="note">${r.num}</div>`:""}<div class="due-meta"><div class="due-meta-item"><div class="due-meta-label">最後維護</div><div class="due-meta-value">${r.last}</div></div><div class="due-meta-item"><div class="due-meta-label">下次保養</div><div class="due-meta-value">${r.next}</div></div></div></div></div>`).join("")}</div>`}
function renderDue(){let items=getDueItems();dueList.innerHTML=items.length?dueTable(items):'<div class="empty">目前沒有 30 天內到期的保養項目</div>'}
function renderHome(){let recent=[...data.records].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,5);homeRecentRecords.innerHTML=recent.length?`<table><thead><tr><th>日期</th><th>設備 / 零件</th><th>內容</th></tr></thead><tbody>${recent.map(r=>`<tr><td>${e(r.date||"-")}</td><td><b>${e(deviceName(r.deviceId))}</b><br><span class="note">${e(r.partId?partName(r.partId):"未指定零件")}</span></td><td>${e(r.desc)}</td></tr>`).join("")}</tbody></table>`:'<div class="empty">目前沒有維護紀錄</div>';let due=getDueItems().slice(0,5);homeDueList.innerHTML=due.length?dueTable(due):'<div class="empty">目前沒有 30 天內到期的保養項目</div>'}
function render(){save();statDevices.textContent=data.devices.length;statParts.textContent=data.parts.length;statRecords.textContent=data.records.length;statDue.textContent=getDueItems().length;refreshSelects();renderDevices();renderParts();renderRecords();renderDue();renderHome()}
function showMainTab(name,btn){["home","devices","records","due"].forEach(t=>document.getElementById("page-"+t).classList.add("hidden"));document.getElementById("page-"+name).classList.remove("hidden");document.querySelectorAll("main>.tabs .tab").forEach(x=>x.classList.remove("active"));(btn||document.querySelectorAll("main>.tabs .tab")[{home:0,devices:1,records:2,due:3}[name]]).classList.add("active");render()}
function showDeviceSubTab(name,btn){["device-list","device-form","part-list"].forEach(t=>document.getElementById("device-sub-"+t).classList.add("hidden"));document.getElementById("device-sub-"+name).classList.remove("hidden");document.querySelectorAll(".subtab").forEach(x=>x.classList.remove("active"));(btn||document.querySelectorAll(".subtab")[{"device-list":0,"device-form":1,"part-list":2}[name]]).classList.add("active");render()}
function exportData(){let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="factory-maintenance-backup.json";a.click();URL.revokeObjectURL(a.href)}
function importData(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=x=>{try{let imported=JSON.parse(x.target.result);if(!imported.devices||!imported.parts||!imported.records)throw Error();data=imported;render();alert("匯入完成")}catch{alert("匯入失敗，請確認 JSON 格式是否正確")}};r.readAsText(f);ev.target.value=""}
function clearAll(){if(!confirm("確定清空全部資料？此動作無法復原。"))return;data={devices:[],parts:[],records:[]};resetDeviceForm();resetPartForm();render()}
recordDate.value=today();render();
</script>
</body>
</html>
