<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>工廠設備零件維護管理</title>

<link href="styles.css" rel="stylesheet"/></head>
<body>
<header><h1>工廠設備零件維護管理</h1><p>管理設備、零件、保養週期與維修履歷，資料儲存在本機瀏覽器。</p></header>
<main>
<div class="tabs"><button class="tab active" onclick="showMainTab('home',this)">首頁</button><button class="tab" onclick="showMainTab('devices',this)">設備清單</button><button class="tab" onclick="showMainTab('records',this)">維護紀錄</button><button class="tab" onclick="showMainTab('due',this)">保養提醒</button></div>
<section id="page-home"><section class="dashboard"><div class="stat"><div class="label">設備數量</div><div class="num" id="statDevices">0</div></div><div class="stat"><div class="label">零件數量</div><div class="num" id="statParts">0</div></div><div class="stat"><div class="label">維護紀錄</div><div class="num" id="statRecords">0</div></div><div class="stat"><div class="label">即將到期</div><div class="num" id="statDue">0</div></div></section><section class="home-grid"><div class="card"><h2>最近維護紀錄</h2><div id="homeRecentRecords"></div></div><div class="card"><h2>即將到期保養</h2><div id="homeDueList"></div></div><div class="card"><h2>資料備份</h2><p class="note">可匯出 JSON 備份，也可以匯入到另一台電腦使用。</p><div class="actions"><button onclick="exportData()">匯出資料</button><button onclick="document.getElementById('importFile').click()">匯入資料</button><input accept=".json" class="hidden" id="importFile" onchange="importData(event)" type="file"/><button class="danger" onclick="clearAll()">清空全部</button></div></div></section></section>
<section class="hidden" id="page-devices"><div class="subtabs"><button class="subtab active" onclick="showDeviceSubTab('device-list',this)">設備清單</button><button class="subtab" onclick="showDeviceSubTab('part-list',this)">零件管理</button></div><div class="card" id="device-sub-device-list"><div class="toolbar"><h2>設備清單</h2><div class="toolbar-actions"><button class="primary" onclick="openNewDeviceDialog()">新增設備</button><div class="search-box"><input class="search" id="deviceSearch" type="search" oninput="toggleSearchClear();render()" placeholder="搜尋設備名稱、編號、位置"/><span class="search-clear hidden" id="deviceSearchClear" onclick="clearDeviceSearch()" role="button" tabindex="0" aria-label="清除搜尋">×</span></div></div></div><p class="note">點擊設備列可查看該設備的零件清單。</p><div id="deviceList"></div></div><div class="card hidden" id="device-sub-part-list"><div class="toolbar"><h2 id="selectedDeviceTitle">零件管理</h2><div class="toolbar-actions"><button class="primary" onclick="editSelectedDevice()">編輯設備</button><button class="primary" onclick="openPartDialog()">新增零件</button><div class="search-box"><input class="search" id="partSearch" type="search" oninput="togglePartSearchClear();render()" placeholder="搜尋零件名稱、Part Number"/><span class="search-clear hidden" id="partSearchClear" onclick="clearPartSearch()" role="button" tabindex="0" aria-label="清除搜尋">×</span></div></div></div><div id="partList"></div></div></section>
<section class="hidden" id="page-records"><div class="card"><h2>新增維護紀錄</h2><div class="row"><div><label>設備</label><select id="recordDevice" onchange="refreshRecordParts()"></select></div><div><label>零件</label><select id="recordPart"></select></div></div><div class="row"><div><label>維護日期</label><input id="recordDate" type="date"/></div><div><label>維護人員</label><input id="recordOwner" placeholder="姓名"/></div></div><label>維護內容 *</label><textarea id="recordDesc" placeholder="例：更換濾芯、檢查皮帶張力、清潔感測器"></textarea><div class="actions"><button class="primary" onclick="saveRecord()">新增紀錄</button></div></div><div class="card"><h2>維護紀錄</h2><div id="recordList"></div></div></section>
<section class="hidden" id="page-due"><div class="card"><h2>保養提醒</h2><p class="note">依照零件的「保養週期」與最後一次維護日期計算。30 天內到期會顯示提醒。</p><div id="dueList"></div></div></section>
</main>

<div class="modal hidden" id="deviceModal" role="dialog" aria-modal="true" aria-labelledby="deviceFormTitle">
  <div class="modal-panel">
    <div class="modal-header">
      <h2 id="deviceFormTitle">新增設備</h2>
      <button class="icon-btn" onclick="closeDeviceDialog()" aria-label="關閉">×</button>
    </div>
    <input id="deviceEditId" type="hidden"/>
    <label>系統唯一識別碼</label>
    <input id="deviceUniqueCode" readonly placeholder="新增時自動產生">
    <p class="note">此識別碼由系統自動產生，用來辨別每一台設備，不會因設備名稱或設備編號修改而改變。</p>
    <label>設備名稱 *</label>
    <input id="deviceName" placeholder="例：CNC-01、空壓機 A"/>
    <div class="row">
      <div><label>設備編號</label><input id="deviceCode" placeholder="EQ-001"/></div>
      <div><label>位置</label><input id="deviceLocation" placeholder="一廠 2F"/></div>
    </div>
    <div class="row">
      <div><label>廠牌</label><input id="deviceBrand" placeholder="Brand"/></div>
      <div><label>型號</label><input id="deviceModel" placeholder="Model"/></div>
    </div>
    <label>序號</label>
    <input id="deviceSerial" placeholder="Serial Number"/>
    <label>備註</label>
    <textarea id="deviceNote" placeholder="可記錄用途、注意事項、SOP 位置等"></textarea>
    <div class="actions modal-actions">
      <button class="primary" onclick="saveDevice()">儲存設備</button>
      <button onclick="resetDeviceForm()">清除</button>
      <button onclick="closeDeviceDialog()">取消</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<div class="modal hidden" id="partModal"><div class="modal-panel"><div class="modal-header"><h2 id="partFormTitle">新增零件</h2><button class="icon-btn" onclick="closePartDialog()" aria-label="關閉">×</button></div><input id="partEditId" type="hidden"/>
<div><label>選擇設備</label><select id="partDevice" onchange="changePartDevice()"></select></div>
<div><label>零件名稱 *</label><input id="partName"/></div>
<div class="row"><div><label>Part Number</label><input id="partNumber"/></div><div><label>保養週期（天）</label><input id="partCycle" type="number"/></div></div>
<div class="actions"><button class="primary" onclick="savePart()">儲存</button><button onclick="closePartDialog()">取消</button></div></div></div>
</body>
</html>
