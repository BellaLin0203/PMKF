<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>工廠設備零件維護管理 v3</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;margin:0;background:#f3f4f6;color:#111827}header{background:#111827;color:#fff;padding:16px}main{max-width:1100px;margin:auto;padding:14px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,.08)}.num{font-size:28px;font-weight:800}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tab,.btn{border:0;border-radius:10px;padding:10px 12px;font-weight:700;cursor:pointer}.tab{background:#e5e7eb}.tab.active,.btn{background:#2563eb;color:#fff}.btn.gray{background:#6b7280}.btn.red{background:#dc2626}.btn.small{font-size:12px;padding:6px 8px}.page{display:none}.page.active{display:block}.layout{display:grid;grid-template-columns:330px 1fr;gap:12px}label{display:block;margin-top:10px;font-weight:700;font-size:13px}input,select,textarea{width:100%;box-sizing:border-box;margin-top:4px;padding:10px;border:1px solid #d1d5db;border-radius:9px;font-size:15px}textarea{min-height:70px}table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden}th,td{border-bottom:1px solid #e5e7eb;padding:9px;text-align:left;vertical-align:top;font-size:14px}th{background:#f9fafb}.msg{margin:10px 0;padding:10px;border-radius:10px;background:#ecfeff;color:#155e75;font-weight:700;display:none}.badge{border-radius:99px;padding:4px 8px;font-weight:800;font-size:12px}.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.bad{background:#fee2e2;color:#991b1b}@media(max-width:850px){.cards{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}table{font-size:13px}}
</style>
</head>
<body>
<header><h2 style="margin:0">工廠設備零件維護管理 v3</h2><div style="font-size:13px;color:#cbd5e1;margin-top:4px">設備、零件、維護紀錄、保養提醒。資料儲存在此瀏覽器。</div></header>
<main>
<div id="msg" class="msg"></div>
<div class="cards"><div class="card">設備總數<div id="sEq" class="num">0</div></div><div class="card">零件總數<div id="sPart" class="num">0</div></div><div class="card">維護紀錄<div id="sLog" class="num">0</div></div><div class="card">即將/逾期<div id="sDue" class="num">0</div></div></div>
<div class="tabs"><button class="tab active" data-page="equipment">設備管理</button><button class="tab" data-page="parts">零件管理</button><button class="tab" data-page="logs">維護紀錄</button><button class="tab" data-page="alerts">保養提醒</button><button class="tab" data-page="backup">匯入/匯出</button></div>
<section id="equipment" class="page active"><div class="layout"><div class="card"><h3>新增設備</h3><label>設備名稱 *</label><input id="eqName" placeholder="例：CNC-01"><label>設備編號</label><input id="eqCode"><label>型號</label><input id="eqModel"><label>序號 SN</label><input id="eqSn"><label>位置</label><input id="eqLoc"><label>負責人</label><input id="eqOwner"><label>備註</label><textarea id="eqNote"></textarea><button id="btnAddEq" class="btn" type="button">新增設備</button></div><div><input id="eqSearch" placeholder="搜尋設備" style="margin-bottom:8px"><table><thead><tr><th>設備</th><th>編號</th><th>型號/SN</th><th>位置</th><th>負責人</th><th>操作</th></tr></thead><tbody id="eqRows"></tbody></table></div></div></section>
<section id="parts" class="page"><div class="layout"><div class="card"><h3>新增零件</h3><label>所屬設備 *</label><select id="partEq"></select><label>零件名稱 *</label><input id="partName"><label>Part Number</label><input id="partNo"><label>供應商</label><input id="partVendor"><label>庫存數量</label><input id="partStock" type="number" value="0"><label>更換週期天數</label><input id="partCycle" type="number" placeholder="例：90"><label>上次更換日期</label><input id="partLast" type="date"><button id="btnAddPart" class="btn" type="button">新增零件</button></div><div><input id="partSearch" placeholder="搜尋零件" style="margin-bottom:8px"><table><thead><tr><th>零件</th><th>設備</th><th>PN/供應商</th><th>庫存</th><th>下次保養</th><th>狀態</th><th>操作</th></tr></thead><tbody id="partRows"></tbody></table></div></div></section>
<section id="logs" class="page"><div class="layout"><div class="card"><h3>新增維護紀錄</h3><label>設備 *</label><select id="logEq"></select><label>零件</label><select id="logPart"></select><label>日期</label><input id="logDate" type="date"><label>類型</label><select id="logType"><option>定期保養</option><option>零件更換</option><option>故障維修</option><option>檢查</option></select><label>維修人員</label><input id="logWorker"><label>停機時間 hr</label><input id="logDown" type="number" value="0"><label>費用</label><input id="logCost" type="number" value="0"><label>內容</label><textarea id="logDetail"></textarea><button id="btnAddLog" class="btn" type="button">新增維護紀錄</button></div><div><input id="logSearch" placeholder="搜尋紀錄" style="margin-bottom:8px"><table><thead><tr><th>日期</th><th>設備/零件</th><th>類型</th><th>人員</th><th>停機/費用</th><th>內容</th><th>操作</th></tr></thead><tbody id="logRows"></tbody></table></div></div></section>
<section id="alerts" class="page"><table><thead><tr><th>狀態</th><th>設備</th><th>零件</th><th>上次</th><th>週期</th><th>下次</th><th>剩餘天數</th></tr></thead><tbody id="alertRows"></tbody></table></section>
<section id="backup" class="page"><div class="card"><button id="btnExport" class="btn" type="button">匯出 JSON</button> <button id="btnClear" class="btn red" type="button">清空全部</button><label>貼上 JSON 匯入</label><textarea id="importText" style="min-height:160px"></textarea><button id="btnImport" class="btn gray" type="button">匯入</button></div></section>
</main>
<script>
(function(){
'use strict';
var KEY='factory-maintenance-v3';
var db={equipment:[],parts:[],logs:[]};
var storageOK=true;
function el(id){return document.getElementById(id)}
function val(id){var x=el(id);return x?String(x.value||'').trim():''}
function msg(t){var m=el('msg');m.textContent=t;m.style.display='block';setTimeout(function(){m.style.display='none'},2500)}
function safeText(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function load(){try{var raw=localStorage.getItem(KEY); if(raw){var d=JSON.parse(raw); if(d&&d.equipment&&d.parts&&d.logs) db=d}}catch(e){storageOK=false;msg('本瀏覽器無法使用 localStorage，資料只會暫存在本頁。')}}
function save(){try{if(storageOK)localStorage.setItem(KEY,JSON.stringify(db))}catch(e){storageOK=false;msg('儲存失敗：瀏覽器可能限制本機儲存。')}render()}
function uid(){return 'id'+Date.now()+Math.floor(Math.random()*10000)}
function eqName(id){for(var i=0;i<db.equipment.length;i++){if(db.equipment[i].id===id)return db.equipment[i].name+' ('+(db.equipment[i].code||'-')+')'}return '-'}
function partName(id){for(var i=0;i<db.parts.length;i++){if(db.parts[i].id===id)return db.parts[i].name}return '-'}
function nextDate(p){if(!p.last||!p.cycle)return '';var d=new Date(p.last+'T00:00:00');d.setDate(d.getDate()+Number(p.cycle));return d.toISOString().slice(0,10)}
function daysLeft(ds){if(!ds)return null;var d=new Date(ds+'T00:00:00');var n=new Date();n.setHours(0,0,0,0);return Math.ceil((d-n)/86400000)}
function badge(d){if(d===null)return '<span class="badge warn">未設定</span>';if(d<0)return '<span class="badge bad">逾期</span>';if(d<=14)return '<span class="badge warn">即將到期</span>';return '<span class="badge ok">正常</span>'}
function updateSelects(){var opts='<option value="">請選擇</option>';for(var i=0;i<db.equipment.length;i++){var e=db.equipment[i];opts+='<option value="'+e.id+'">'+safeText(e.name)+' ('+safeText(e.code||'-')+')</option>'}el('partEq').innerHTML=opts;el('logEq').innerHTML=opts;updateLogParts()}
function updateLogParts(){var eid=val('logEq');var opts='<option value="">不指定</option>';for(var i=0;i<db.parts.length;i++){var p=db.parts[i];if(!eid||p.equipmentId===eid)opts+='<option value="'+p.id+'">'+safeText(p.name)+' ('+safeText(p.partNo||'-')+')</option>'}el('logPart').innerHTML=opts}
function render(){updateSelects();el('sEq').textContent=db.equipment.length;el('sPart').textContent=db.parts.length;el('sLog').textContent=db.logs.length;var due=0;for(var i=0;i<db.parts.length;i++){var dl=daysLeft(nextDate(db.parts[i]));if(dl!==null&&dl<=14)due++}el('sDue').textContent=due;renderEq();renderParts();renderLogs();renderAlerts()}
function renderEq(){var q=val('eqSearch').toLowerCase();var h='';for(var i=0;i<db.equipment.length;i++){var e=db.equipment[i];if(JSON.stringify(e).toLowerCase().indexOf(q)<0)continue;h+='<tr><td><b>'+safeText(e.name)+'</b><br>'+safeText(e.note)+'</td><td>'+safeText(e.code||'-')+'</td><td>'+safeText(e.model||'-')+'<br>'+safeText(e.sn)+'</td><td>'+safeText(e.location||'-')+'</td><td>'+safeText(e.owner||'-')+'</td><td><button class="btn small red" data-del="equipment" data-id="'+e.id+'">刪除</button></td></tr>'}el('eqRows').innerHTML=h||'<tr><td colspan="6">尚無設備</td></tr>'}
function renderParts(){var q=val('partSearch').toLowerCase();var h='';for(var i=0;i<db.parts.length;i++){var p=db.parts[i];var text=(JSON.stringify(p)+eqName(p.equipmentId)).toLowerCase();if(text.indexOf(q)<0)continue;var nd=nextDate(p),dl=daysLeft(nd);h+='<tr><td><b>'+safeText(p.name)+'</b></td><td>'+safeText(eqName(p.equipmentId))+'</td><td>'+safeText(p.partNo||'-')+'<br>'+safeText(p.vendor)+'</td><td>'+p.stock+'</td><td>'+(nd||'-')+'</td><td>'+badge(dl)+'</td><td><button class="btn small red" data-del="parts" data-id="'+p.id+'">刪除</button></td></tr>'}el('partRows').innerHTML=h||'<tr><td colspan="7">尚無零件</td></tr>'}
function renderLogs(){var q=val('logSearch').toLowerCase();var arr=db.logs.slice().sort(function(a,b){return String(b.date).localeCompare(String(a.date))});var h='';for(var i=0;i<arr.length;i++){var l=arr[i];var text=(JSON.stringify(l)+eqName(l.equipmentId)+partName(l.partId)).toLowerCase();if(text.indexOf(q)<0)continue;h+='<tr><td>'+safeText(l.date||'-')+'</td><td>'+safeText(eqName(l.equipmentId))+'<br>'+safeText(partName(l.partId))+'</td><td>'+safeText(l.type)+'</td><td>'+safeText(l.worker||'-')+'</td><td>'+l.downtime+' hr<br>$'+l.cost+'</td><td>'+safeText(l.detail||'-')+'</td><td><button class="btn small red" data-del="logs" data-id="'+l.id+'">刪除</button></td></tr>'}el('logRows').innerHTML=h||'<tr><td colspan="7">尚無紀錄</td></tr>'}
function renderAlerts(){var h='';for(var i=0;i<db.parts.length;i++){var p=db.parts[i],nd=nextDate(p),dl=daysLeft(nd);h+='<tr><td>'+badge(dl)+'</td><td>'+safeText(eqName(p.equipmentId))+'</td><td>'+safeText(p.name)+'</td><td>'+safeText(p.last||'-')+'</td><td>'+safeText(p.cycle||'-')+' 天</td><td>'+(nd||'-')+'</td><td>'+(dl===null?'-':dl)+'</td></tr>'}el('alertRows').innerHTML=h||'<tr><td colspan="7">尚無提醒</td></tr>'}
function addEq(){var name=val('eqName');if(!name){msg('請先輸入設備名稱');return}db.equipment.push({id:uid(),name:name,code:val('eqCode'),model:val('eqModel'),sn:val('eqSn'),location:val('eqLoc'),owner:val('eqOwner'),note:val('eqNote')});['eqName','eqCode','eqModel','eqSn','eqLoc','eqOwner','eqNote'].forEach(function(id){el(id).value=''}) ;save();msg('已新增設備')}
function addPart(){if(!val('partEq')){msg('請先選擇所屬設備');return}if(!val('partName')){msg('請輸入零件名稱');return}db.parts.push({id:uid(),equipmentId:val('partEq'),name:val('partName'),partNo:val('partNo'),vendor:val('partVendor'),stock:Number(val('partStock')||0),cycle:Number(val('partCycle')||0),last:val('partLast')});['partName','partNo','partVendor','partCycle'].forEach(function(id){el(id).value=''}) ;el('partStock').value='0';save();msg('已新增零件')}
function addLog(){if(!val('logEq')){msg('請先選擇設備');return}var l={id:uid(),equipmentId:val('logEq'),partId:val('logPart'),date:val('logDate'),type:val('logType'),worker:val('logWorker'),downtime:Number(val('logDown')||0),cost:Number(val('logCost')||0),detail:val('logDetail')};db.logs.push(l);for(var i=0;i<db.parts.length;i++){if(db.parts[i].id===l.partId&&(l.type==='零件更換'||l.type==='定期保養'))db.parts[i].last=l.date}['logWorker','logDown','logCost','logDetail'].forEach(function(id){el(id).value=(id==='logDown'||id==='logCost')?'0':''}) ;save();msg('已新增維護紀錄')}
function del(type,id){if(!confirm('確定刪除？'))return;db[type]=db[type].filter(function(x){return x.id!==id});if(type==='equipment'){db.parts=db.parts.filter(function(p){return p.equipmentId!==id});db.logs=db.logs.filter(function(l){return l.equipmentId!==id})}if(type==='parts'){db.logs=db.logs.filter(function(l){return l.partId!==id})}save();msg('已刪除')}
function bind(){el('btnAddEq').addEventListener('click',addEq);el('btnAddPart').addEventListener('click',addPart);el('btnAddLog').addEventListener('click',addLog);el('logEq').addEventListener('change',updateLogParts);['eqSearch','partSearch','logSearch'].forEach(function(id){el(id).addEventListener('input',render)});document.body.addEventListener('click',function(ev){var t=ev.target;if(t.getAttribute('data-page')){var p=t.getAttribute('data-page');document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active')});t.classList.add('active');document.querySelectorAll('.page').forEach(function(s){s.classList.remove('active')});el(p).classList.add('active')}if(t.getAttribute('data-del'))del(t.getAttribute('data-del'),t.getAttribute('data-id'))});el('btnExport').addEventListener('click',function(){var blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='factory-maintenance-data.json';a.click();msg('已匯出')});el('btnImport').addEventListener('click',function(){try{var d=JSON.parse(val('importText'));if(!d.equipment||!d.parts||!d.logs)throw new Error('bad');db=d;save();msg('匯入完成')}catch(e){msg('JSON 格式錯誤')}});el('btnClear').addEventListener('click',function(){if(confirm('確定清空全部資料？')){db={equipment:[],parts:[],logs:[]};save();msg('已清空')}})}
window.onerror=function(m){msg('程式錯誤：'+m);return false};
load();bind();var d=new Date().toISOString().slice(0,10);el('partLast').value=d;el('logDate').value=d;render();msg('App 已載入，可新增設備');
})();
</script>
</body>
</html>
